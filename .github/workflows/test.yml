name: Node.js Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          check-latest: true
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: node --test --experimental-strip-types tests/*.test.ts
